[env:cardputer-adv]
platform = espressif32
; Cardputer Adv is built on the Stamp-S3A core module (ESP32-S3FN8: 8MB
; flash, no PSRAM). There's no dedicated PlatformIO board def for it (and
; "m5stack-stamps3" is reportedly flaky as an "Unknown board ID" on some
; platform versions), so this uses the generic devkit board with explicit
; flash settings matching the actual chip instead of relying on a board def.
board = esp32-s3-devkitc-1
board_build.flash_size = 8MB
board_build.psram_type = disabled
framework = arduino
monitor_speed = 115200

lib_deps =
	m5stack/M5Cardputer @ ^1.0.3
	bblanchon/ArduinoJson @ ^7.0
